<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <meta name="description" content="Генератор синуса 0–20000 Гц с точным вводом частоты и длительности WAV. Выбор шкалы: логарифмическая (A) или линейная (B).">
    <meta name="author" content="Pavel Volkov / volkovhl.github.io">
    <title>Генератор синуса 0–20000 Гц — логарифмическая и линейная шкала</title>
    <link rel="icon"
        href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;〰️&lt;/text&gt;&lt;/svg&gt;">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        body {
            background: #0b0e14;
            color: #ffffff;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            padding: 6px 10px 4px 10px;
            touch-action: none;
        }

        .main-wrapper {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            margin: 0 auto;
            padding: 2px 0;
        }

        .freq-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-shrink: 0;
            margin-top: 0;
            flex-wrap: wrap;
        }

        #freqDisplay {
            font-size: clamp(32px, 10vw, 56px);
            font-weight: 700;
            letter-spacing: 1px;
            color: #e8e8e8;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.15);
            line-height: 1.2;
        }

        #freqUnit {
            font-size: 0.4em;
            font-weight: 400;
            color: #8899aa;
            margin-left: 4px;
        }

        #freqInput {
            background: #1a2a3a;
            border: 2px solid #4a6a8a;
            border-radius: 12px;
            color: #fff;
            font-size: clamp(20px, 5vw, 32px);
            font-weight: 600;
            width: clamp(100px, 22vw, 160px);
            padding: 4px 8px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            -moz-appearance: textfield;
        }

        #freqInput::-webkit-outer-spin-button,
        #freqInput::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #freqInput:focus {
            border-color: #8ecae6;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.2);
        }

        #sliderWrapper {
            flex: 1 1 auto;
            width: 100%;
            min-height: 30px;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 12px;
        }

        /* Вертикальные кнопки шкалы с крупными подписями */
        .scale-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .scale-btn {
            background: #1a2a3a;
            border: 2px solid #3a5a7a;
            color: #aabbcc;
            font-size: clamp(14px, 2.2vw, 20px);
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
            font-family: inherit;
            min-width: 44px;
            text-align: center;
            line-height: 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scale-btn .label {
            font-size: clamp(9px, 1.4vw, 13px);
            font-weight: 500;
            color: #8899aa;
            line-height: 1.2;
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .scale-btn.active {
            border-color: #8ecae6;
            background: #2a4a6a;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.25);
        }

        .scale-btn.active .label {
            color: #b0d8f0;
        }

        .scale-btn:active {
            transform: scale(0.92);
        }

        #freqSlider {
            width: min(60vh, 76%);
            height: 38px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 19px;
            background: linear-gradient(to right, #4a6fa5, #8ecae6, #f9c74f, #f9844a, #e63946);
            outline: none;
            cursor: pointer;
            touch-action: none;
            transform: rotate(-90deg);
        }

        #freqSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f0f9ff, #b0c4de);
            box-shadow: 0 0 20px rgba(100, 180, 255, 0.5), 0 4px 12px rgba(0, 0, 0, 0.5);
            border: 2px solid #ffffff88;
            transition: 0.1s;
            touch-action: none;
        }

        #freqSlider::-webkit-slider-thumb:active {
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(100, 180, 255, 0.8);
        }

        #freqSlider::-moz-range-thumb {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f0f9ff, #b0c4de);
            box-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
            border: 2px solid #ffffff88;
            cursor: pointer;
            touch-action: none;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        #toggleBtn {
            background: #2a3a4a;
            border: none;
            color: #fff;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
            transition: all 0.25s ease;
            touch-action: manipulation;
            cursor: pointer;
            border: 1px solid #4a6a8a;
            flex: 0 1 auto;
        }

        #toggleBtn:active {
            transform: scale(0.94);
        }

        #toggleBtn.active {
            background: #4a8a6a;
            border-color: #6ab08a;
            box-shadow: 0 0 30px rgba(74, 138, 106, 0.4);
        }

        .duration-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a2a3a;
            padding: 4px 12px 4px 8px;
            border-radius: 50px;
            border: 1px solid #4a6a8a;
        }

        .duration-group label {
            color: #8899aa;
            font-size: clamp(13px, 2.5vw, 16px);
            font-weight: 500;
        }

        #durationInput {
            background: transparent;
            border: none;
            color: #fff;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: 600;
            width: clamp(70px, 16vw, 110px);
            text-align: center;
            outline: none;
            font-family: inherit;
            -moz-appearance: textfield;
            padding: 4px 0;
        }

        #durationInput::-webkit-outer-spin-button,
        #durationInput::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .duration-group span {
            color: #8899aa;
            font-size: clamp(13px, 2.5vw, 16px);
        }

        #downloadBtn {
            background: #3a3f5a;
            border: none;
            color: #fff;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 50px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
            transition: all 0.25s ease;
            touch-action: manipulation;
            cursor: pointer;
            border: 1px solid #6a7a9a;
            flex: 0 1 auto;
        }

        #downloadBtn:active {
            transform: scale(0.94);
        }

        #hint {
            font-size: clamp(11px, 2.5vw, 13px);
            color: #556677;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-top: 0;
            margin-bottom: 1px;
        }

        .footer-links {
            flex: 0 0 auto;
            text-align: center;
            font-size: clamp(12px, 2.8vw, 14px);
            border-top: 1px solid #2a4b62;
            padding: 10px 0 4px 0;
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
            background: #0b0e14;
        }

        .footer-links a {
            color: #7a5a3a;
            text-decoration: none;
            margin: 0 8px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        @media (max-height: 600px) {
            #freqSlider {
                height: 30px;
                width: min(50vh, 68%);
            }

            #freqSlider::-webkit-slider-thumb {
                width: 26px;
                height: 26px;
            }

            #toggleBtn,
            #downloadBtn {
                padding: 8px 20px;
                font-size: 15px;
            }

            .footer-links {
                padding-top: 6px;
                font-size: 11px;
            }

            #freqInput {
                font-size: 20px;
                width: 90px;
                padding: 2px 6px;
            }

            #durationInput {
                font-size: 16px;
                width: 70px;
            }

            .duration-group {
                padding: 2px 10px 2px 6px;
            }

            .scale-btn {
                font-size: 12px;
                padding: 4px 8px;
                min-width: 34px;
            }

            .scale-btn .label {
                font-size: 8px;
            }
        }

        @media (max-height: 480px) {
            #freqSlider {
                height: 24px;
                width: min(40vh, 58%);
            }

            #freqSlider::-webkit-slider-thumb {
                width: 22px;
                height: 22px;
            }

            #toggleBtn,
            #downloadBtn {
                padding: 6px 16px;
                font-size: 13px;
            }

            #freqDisplay {
                font-size: 28px;
            }

            #hint {
                font-size: 10px;
            }

            #freqInput {
                font-size: 16px;
                width: 80px;
                padding: 2px 4px;
            }

            #durationInput {
                font-size: 14px;
                width: 60px;
            }

            .duration-group {
                padding: 2px 8px 2px 4px;
            }

            .scale-btn {
                font-size: 10px;
                padding: 3px 6px;
                min-width: 28px;
                border-radius: 14px;
            }

            .scale-btn .label {
                font-size: 7px;
            }
        }

        @media (max-width: 400px) {
            #sliderWrapper {
                gap: 6px;
            }

            .scale-btn {
                font-size: 11px;
                padding: 3px 6px;
                min-width: 30px;
            }

            .scale-btn .label {
                font-size: 7px;
            }
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <div class="freq-row">
            <div id="freqDisplay">
                <span id="freqValue">1000.0</span><span id="freqUnit">Гц</span>
            </div>
            <input type="number" id="freqInput" min="0" max="20000" step="0.1" value="1000">
        </div>

        <div id="sliderWrapper">
            <!-- Вертикальные кнопки шкалы с крупными подписями -->
            <div class="scale-group">
                <button class="scale-btn active" data-scale="log">
                    A
                    <span class="label">логарифм.</span>
                </button>
                <button class="scale-btn" data-scale="lin">
                    B
                    <span class="label">линейная</span>
                </button>
            </div>
            <input type="range" id="freqSlider" min="0" max="1" step="0.0005" value="0.5">
        </div>

        <div class="controls-row">
            <button id="toggleBtn">▶ Включить</button>
            <div class="duration-group">
                <label>⏱</label>
                <input type="number" id="durationInput" min="0.1" max="1000" step="0.1" value="60">
                <span>с</span>
            </div>
            <button id="downloadBtn">⬇ WAV</button>
        </div>
        <div id="hint">тяните вверх‑вниз или введите частоту</div>
    </div>
    <div class="footer-links">
        <a href="https://volkovhl.github.io/" target="_blank">volkovhl.github.io</a> |
        <a href="https://www.youtube.com/@Pavel_Volkov" target="_blank">Дела Техники</a>
    </div>
    <script>
        (function () {
            'use strict';

            const slider = document.getElementById('freqSlider');
            const freqValue = document.getElementById('freqValue');
            const freqInput = document.getElementById('freqInput');
            const durationInput = document.getElementById('durationInput');
            const toggleBtn = document.getElementById('toggleBtn');
            const downloadBtn = document.getElementById('downloadBtn');

            let audioCtx = null;
            let oscillator = null;
            let gainNode = null;
            let isPlaying = false;
            let ignoreSliderUpdate = false;
            let ignoreInputUpdate = false;

            const MIN_FREQ = 0;
            const MAX_FREQ = 20000;
            const LOG_MIN = 1;
            const RATIO = MAX_FREQ / LOG_MIN;

            let currentScale = 'log';
            let exactFreq = 1000;

            // ----- Преобразования частоты <-> значение слайдера (0..1) -----
            function sliderToFreq(val) {
                if (val <= 0) return 0;
                const v = Math.min(1, Math.max(0, val));
                if (currentScale === 'log') {
                    return LOG_MIN * Math.pow(RATIO, v);
                } else {
                    // linear
                    return MIN_FREQ + v * (MAX_FREQ - MIN_FREQ);
                }
            }

            function freqToSlider(freq) {
                const f = Math.min(MAX_FREQ, Math.max(MIN_FREQ, freq));
                if (f <= 0) return 0;
                if (currentScale === 'log') {
                    const clamped = Math.min(MAX_FREQ, Math.max(LOG_MIN, f));
                    return Math.log(clamped / LOG_MIN) / Math.log(RATIO);
                } else {
                    return (f - MIN_FREQ) / (MAX_FREQ - MIN_FREQ);
                }
            }

            // ----- Вспомогательные функции -----
            function getSliderFreq() {
                return sliderToFreq(parseFloat(slider.value));
            }

            function getCurrentFreq() {
                return exactFreq;
            }

            function getDuration() {
                let val = parseFloat(durationInput.value);
                if (isNaN(val) || val < 0.1) val = 0.1;
                if (val > 1000) val = 1000;
                return val;
            }

            function clampFreq(freq) {
                return Math.min(MAX_FREQ, Math.max(MIN_FREQ, freq));
            }

            function roundFreq(freq) {
                return Math.round(freq * 10) / 10;
            }

            function updateDisplay(freq) {
                const rounded = roundFreq(freq);
                if (rounded === 0) {
                    freqValue.textContent = '0.0';
                } else {
                    freqValue.textContent = rounded.toFixed(1);
                }
                if (!ignoreInputUpdate) {
                    ignoreInputUpdate = true;
                    freqInput.value = rounded.toFixed(1);
                    ignoreInputUpdate = false;
                }
            }

            function syncSliderAndDisplayFromFreq(freq) {
                const clamped = clampFreq(freq);
                exactFreq = clamped;
                const sliderVal = freqToSlider(clamped);
                ignoreSliderUpdate = true;
                slider.value = Math.min(1, Math.max(0, sliderVal));
                ignoreSliderUpdate = false;
                updateDisplay(clamped);
            }

            function updateOscillatorFreq(freq) {
                if (isPlaying && oscillator) {
                    try {
                        oscillator.frequency.setTargetAtTime(freq > 0 ? freq : 1, audioCtx.currentTime, 0.01);
                        gainNode.gain.setTargetAtTime(freq > 0 ? 0.3 : 0, audioCtx.currentTime, 0.01);
                    } catch (e) {
                        oscillator.frequency.value = freq > 0 ? freq : 1;
                        gainNode.gain.value = freq > 0 ? 0.3 : 0;
                    }
                }
            }

            // ----- Изменение шкалы -----
            function setScale(scale) {
                if (scale === currentScale) return;
                currentScale = scale;

                document.querySelectorAll('.scale-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.scale === scale);
                });

                const freq = getCurrentFreq();
                const sliderVal = freqToSlider(freq);
                ignoreSliderUpdate = true;
                slider.value = Math.min(1, Math.max(0, sliderVal));
                ignoreSliderUpdate = false;
            }

            // ----- События слайдера -----
            slider.addEventListener('input', function () {
                if (ignoreSliderUpdate) return;
                const freq = getSliderFreq();
                exactFreq = freq;
                updateDisplay(freq);
                updateOscillatorFreq(freq);
            });

            // ----- События ввода частоты -----
            freqInput.addEventListener('input', function () {
                if (ignoreInputUpdate) return;
                const rawValue = freqInput.value.trim();
                if (rawValue === '' || rawValue === '.' || rawValue === ',' || rawValue === '-') return;
                let val = parseFloat(rawValue);
                if (isNaN(val)) return;
                if (rawValue.endsWith('.') || rawValue.endsWith(',')) return;
                if (val < MIN_FREQ) val = MIN_FREQ;
                if (val > MAX_FREQ) val = MAX_FREQ;
                const clamped = clampFreq(val);
                exactFreq = clamped;

                const sliderVal = freqToSlider(clamped);
                ignoreSliderUpdate = true;
                slider.value = Math.min(1, Math.max(0, sliderVal));
                ignoreSliderUpdate = false;

                const rounded = roundFreq(clamped);
                freqValue.textContent = rounded === 0 ? '0.0' : rounded.toFixed(1);

                updateOscillatorFreq(clamped);
            });

            freqInput.addEventListener('blur', function () {
                const rawValue = freqInput.value.trim();
                if (rawValue === '' || rawValue === '.' || rawValue === ',' || rawValue === '-') {
                    updateDisplay(exactFreq);
                    return;
                }
                let val = parseFloat(rawValue);
                if (isNaN(val)) {
                    updateDisplay(exactFreq);
                    return;
                }
                if (val < MIN_FREQ) val = MIN_FREQ;
                if (val > MAX_FREQ) val = MAX_FREQ;
                const clamped = clampFreq(val);
                exactFreq = clamped;
                const sliderVal = freqToSlider(clamped);
                ignoreSliderUpdate = true;
                slider.value = Math.min(1, Math.max(0, sliderVal));
                ignoreSliderUpdate = false;
                updateDisplay(clamped);
                updateOscillatorFreq(clamped);
            });

            // ----- Звук -----
            function startSound() {
                if (isPlaying) return;
                try {
                    if (!audioCtx) {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                    oscillator = audioCtx.createOscillator();
                    gainNode = audioCtx.createGain();
                    oscillator.type = 'sine';
                    const freq = getCurrentFreq();
                    oscillator.frequency.value = freq > 0 ? freq : 1;
                    gainNode.gain.setValueAtTime(freq > 0 ? 0.3 : 0, audioCtx.currentTime);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start(0);
                    isPlaying = true;
                    toggleBtn.textContent = '⏹ Выключить';
                    toggleBtn.classList.add('active');
                } catch (err) {
                    console.warn('Ошибка запуска:', err);
                }
            }

            function stopSound() {
                if (!isPlaying) return;
                try {
                    if (oscillator) {
                        oscillator.stop(0);
                        oscillator.disconnect();
                        oscillator = null;
                    }
                    if (gainNode) {
                        gainNode.disconnect();
                        gainNode = null;
                    }
                    isPlaying = false;
                    toggleBtn.textContent = '▶ Включить';
                    toggleBtn.classList.remove('active');
                } catch (err) {
                    console.warn('Ошибка остановки:', err);
                }
            }

            function toggleSound() {
                if (isPlaying) {
                    stopSound();
                } else {
                    startSound();
                }
            }

            // ----- Скачивание WAV -----
            function downloadWav() {
                const freq = getCurrentFreq();
                const duration = getDuration();
                const sampleRate = 44100;
                const numSamples = Math.floor(sampleRate * duration);
                const amplitude = 0.6;

                if (numSamples < 1) {
                    alert('Слишком короткая длительность');
                    return;
                }

                const buffer = new Float32Array(numSamples);

                if (freq === 0) {
                    for (let i = 0; i < numSamples; i++) {
                        buffer[i] = 0;
                    }
                } else {
                    for (let i = 0; i < numSamples; i++) {
                        const t = i / sampleRate;
                        buffer[i] = amplitude * Math.sin(2 * Math.PI * freq * t);
                    }
                }

                const fadeSamples = Math.min(Math.floor(sampleRate * 0.01), Math.floor(numSamples / 10));
                if (fadeSamples > 0 && numSamples > fadeSamples * 2) {
                    for (let i = 0; i < fadeSamples; i++) {
                        const gain = i / fadeSamples;
                        buffer[i] *= gain;
                        buffer[numSamples - 1 - i] *= gain;
                    }
                }

                const int16Buffer = new Int16Array(numSamples);
                for (let i = 0; i < numSamples; i++) {
                    const s = Math.max(-1, Math.min(1, buffer[i]));
                    int16Buffer[i] = Math.floor(s * 0x7FFF);
                }

                const dataSize = int16Buffer.length * 2;
                const header = new ArrayBuffer(44);
                const view = new DataView(header);
                view.setUint32(0, 0x52494646, false);
                view.setUint32(4, 36 + dataSize, true);
                view.setUint32(8, 0x57415645, false);
                view.setUint32(12, 0x666D7420, false);
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                view.setUint32(36, 0x64617461, false);
                view.setUint32(40, dataSize, true);

                const wavBlob = new Blob([header, int16Buffer.buffer], { type: 'audio/wav' });
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url;

                const freqLabel = freq === 0 ? '0.0' : freq.toFixed(1);
                const durLabel = duration.toFixed(1);
                a.download = `sine_${freqLabel}Hz_${durLabel}s.wav`;

                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            }

            // ----- Обработчики кнопок шкалы -----
            document.querySelectorAll('.scale-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    setScale(this.dataset.scale);
                });
                btn.addEventListener('touchstart', function (e) {
                    e.preventDefault();
                    setScale(this.dataset.scale);
                }, { passive: false });
            });

            // ----- Прочие события -----
            toggleBtn.addEventListener('click', toggleSound);
            toggleBtn.addEventListener('touchstart', function (e) {
                e.preventDefault();
                toggleSound();
            });

            downloadBtn.addEventListener('click', downloadWav);
            downloadBtn.addEventListener('touchstart', function (e) {
                e.preventDefault();
                downloadWav();
            });

            slider.addEventListener('touchstart', function (e) {
                if (!isPlaying) {
                    setTimeout(() => {
                        if (!isPlaying) startSound();
                    }, 50);
                }
            }, { passive: true });

            document.addEventListener('visibilitychange', function () {
                if (document.hidden && isPlaying) {
                    stopSound();
                }
            });

            durationInput.addEventListener('blur', function () {
                let val = parseFloat(durationInput.value);
                if (isNaN(val) || val < 0.1) val = 0.1;
                if (val > 1000) val = 1000;
                durationInput.value = val.toFixed(1);
            });

            durationInput.addEventListener('input', function () {
                let val = parseFloat(durationInput.value);
                if (isNaN(val)) return;
                if (val < 0.1) val = 0.1;
                if (val > 1000) val = 1000;
            });

            // Инициализация
            exactFreq = 1000;
            updateDisplay(1000);
            durationInput.value = '60.0';
            const initSliderVal = freqToSlider(1000);
            slider.value = Math.min(1, Math.max(0, initSliderVal));

        })();
    </script>
</body>

</html>
